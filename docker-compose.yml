services:
  game-server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CANARY_LOGIN_PORT:-7171}:7171"
      - "${CANARY_GAME_PORT:-7172}:7172"
      - "${CANARY_STATUS_PORT:-7173}:7173"
    environment:
      CANARY_DB_HOST: ${CANARY_DB_HOST}
      CANARY_DB_PORT: ${CANARY_DB_PORT}
      CANARY_DB_NAME: ${CANARY_DB_NAME}
      CANARY_DB_USER: ${CANARY_DB_USER}
      CANARY_DB_PASSWORD: ${CANARY_DB_PASSWORD}
      CANARY_SERVER_NAME: ${CANARY_SERVER_NAME}
      CANARY_SERVER_IP: ${CANARY_SERVER_IP}
      CANARY_SERVER_LOCATION: ${CANARY_SERVER_LOCATION}
      CANARY_LOGIN_PORT: ${CANARY_LOGIN_PORT}
      CANARY_GAME_PORT: ${CANARY_GAME_PORT}
      CANARY_STATUS_PORT: ${CANARY_STATUS_PORT}
      CANARY_STATUS_TIMEOUT: ${CANARY_STATUS_TIMEOUT}
      CANARY_DATA_PACK: ${CANARY_DATA_PACK}
      CANARY_LEGACY_1100_GAME_PORT: ${CANARY_LEGACY_1100_GAME_PORT}
      CANARY_LEGACY_860_GAME_PORT: ${CANARY_LEGACY_860_GAME_PORT}
